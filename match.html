  <script>
    
    function identify(data="") {

<!--   sound toggle -->
  <script>
    var speaker = true;

    function toggleSpeaker() {
      var speakerImage = document.getElementById('speakerImage');

      if (speaker) {
        speakerImage.src = 'Assets/soundoff.png';
        speaker = false;
      } else {
        speakerImage.src = 'Assets/soundon.png';
        speaker = true;
      }
    }

    document.getElementById('speakerContainer').addEventListener('click', toggleSpeaker);
  </script>
  
<!--   sound system -->
  <script>
      const tada = document.getElementById("tada");
      const good = document.getElementById("good");
      const bad = document.getElementById("bad");
      const slide = document.getElementById("slide");
      const click = document.getElementById("click");
      const up = document.getElementById("up");
    
      function playTada() {
        if(speaker)
        {
          tada.muted = false;
          tada.play();
          
        }
         
      }
      function playGood() {
        if(speaker)
        {
          good.muted = false;
          good.play();
          
        }
           
        }
      function playBad() {
          if(speaker)
          {
               bad.muted = false;
              bad.play();

          }
          
        }
      function playClick() {
        if(speaker)
        {
          click.muted = false;
          click.play();
          
        }
           
        }
      function playSlide() {
        if(speaker)
        {
          slide.muted = false;
          slide.play();
          
        }
           
        }
      function playUp() {
        if(speaker)
        {
          up.muted = false;
          up.play();
          
        }
           
        }
</script>

<!--  confetti -->
  <script> 
    function startConfetti(timeduration)
    {
        confetti.reset();
         // do this for 30 seconds
        var duration = timeduration * 1000;
        var end = Date.now() + duration;

        (function frame() {
          // launch a few confetti from the left edge
          confetti({
            particleCount: 7,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
          });
          // and launch a few from the right edge
          confetti({
            particleCount: 7,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
          });

          // keep going until we are out of time
          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        }());
    }

    function smallConfetti()
    {
        confetti.reset();
        confetti({
          particleCount: 100,
          startVelocity: 30,
          spread: 360,
          origin: {
            x: Math.random(),
            // since they fall down, start a bit higher than random
            y: Math.random() - 0.2
          }
        });
    }
  </script>
  
<!--  swipe engine -->
